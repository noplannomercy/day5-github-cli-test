<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Modern Timer Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2bd4c0",
                        "background-light": "#f6f8f8",
                        "background-dark": "#12201e", // Matching theme config
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .progress-ring-glow {
            filter: drop-shadow(0 0 8px rgba(43, 212, 192, 0.4));
        }
        /* Custom scrollbar for clean look */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a3735;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white min-h-screen transition-colors duration-300">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- TopNavBar Component -->
<header class="flex items-center justify-between px-10 py-6 border-b border-white/5 bg-background-light/50 dark:bg-background-dark/50 backdrop-blur-md z-10">
<div class="flex items-center gap-3">
<div class="size-8 bg-primary rounded-lg flex items-center justify-center text-background-dark">
<span class="material-symbols-outlined font-bold">hourglass_empty</span>
</div>
<h2 class="text-xl font-bold leading-tight tracking-tight font-display">FocusFlow</h2>
</div>
<div class="flex items-center gap-2">
<button class="flex items-center justify-center rounded-full size-10 bg-white/5 hover:bg-white/10 text-white transition-all">
<span class="material-symbols-outlined">settings</span>
</button>
<button class="flex items-center justify-center rounded-full size-10 bg-white/5 hover:bg-white/10 text-white transition-all">
<span class="material-symbols-outlined">account_circle</span>
</button>
</div>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-4 relative">
<!-- Tabs Component -->
<div class="mb-12">
<div class="flex bg-white/5 p-1.5 rounded-full border border-white/10">
<a class="flex items-center justify-center px-8 py-2.5 rounded-full bg-primary text-background-dark font-bold text-sm transition-all shadow-lg shadow-primary/20" href="#">
                        Timer
                    </a>
<a class="flex items-center justify-center px-8 py-2.5 rounded-full text-slate-400 hover:text-white font-bold text-sm transition-all" href="#">
                        Stopwatch
                    </a>
<a class="flex items-center justify-center px-8 py-2.5 rounded-full text-slate-400 hover:text-white font-bold text-sm transition-all" href="#">
                        Pomodoro
                    </a>
</div>
</div>
<!-- Central Timer Display -->
<div class="relative flex flex-col items-center justify-center">
<!-- Circular Progress Ring (SVG) -->
<div class="relative size-80 md:size-96 flex items-center justify-center">
<svg class="absolute inset-0 size-full -rotate-90 transform" viewbox="0 0 100 100">
<!-- Background Circle -->
<circle class="text-white/5" cx="50" cy="50" fill="transparent" r="45" stroke="currentColor" stroke-width="2"></circle>
<!-- Progress Circle -->
<circle class="text-primary progress-ring-glow" cx="50" cy="50" fill="transparent" r="45" stroke="currentColor" stroke-dasharray="282.7" stroke-dashoffset="70" stroke-linecap="round" stroke-width="3"></circle>
</svg>
<!-- Timer Component: Digits -->
<div class="text-center z-10">
<div class="flex items-baseline gap-1 font-mono text-7xl md:text-8xl font-medium tracking-tighter">
<span>00</span>
<span class="text-white/20 -translate-y-1">:</span>
<span>25</span>
<span class="text-white/20 -translate-y-1">:</span>
<span class="text-primary">00</span>
</div>
<p class="text-slate-400 mt-2 font-display uppercase tracking-[0.2em] text-xs font-semibold">Focus Session</p>
</div>
</div>
<!-- ButtonGroup Component: Main Controls -->
<div class="mt-12 flex items-center gap-6">
<button class="size-14 flex items-center justify-center rounded-full border border-white/10 bg-white/5 text-white hover:bg-white/10 transition-all group">
<span class="material-symbols-outlined text-3xl group-active:scale-90 transition-transform">restart_alt</span>
</button>
<button class="h-16 px-12 flex items-center justify-center rounded-full bg-primary text-background-dark font-black text-lg tracking-wide hover:brightness-110 active:scale-95 transition-all shadow-xl shadow-primary/20">
                        START
                    </button>
<button class="size-14 flex items-center justify-center rounded-full border border-white/10 bg-white/5 text-white hover:bg-white/10 transition-all group">
<span class="material-symbols-outlined text-3xl group-active:scale-90 transition-transform">pause</span>
</button>
</div>
<!-- Preset Buttons -->
<div class="mt-10 flex gap-3">
<button class="px-6 py-2 rounded-full border border-primary/30 text-primary text-sm font-bold hover:bg-primary/10 transition-all">
                        5 min
                    </button>
<button class="px-6 py-2 rounded-full border border-primary/30 text-primary text-sm font-bold hover:bg-primary/10 transition-all bg-primary/5">
                        15 min
                    </button>
<button class="px-6 py-2 rounded-full border border-primary/30 text-primary text-sm font-bold hover:bg-primary/10 transition-all">
                        25 min
                    </button>
</div>
</div>
<!-- ProgressBar Component (Subtle mini version) -->
<div class="absolute bottom-10 w-full max-w-md px-4">
<div class="flex flex-col gap-3 p-6 bg-white/5 border border-white/10 rounded-2xl backdrop-blur-sm">
<div class="flex gap-6 justify-between items-center">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-lg">notifications_active</span>
<p class="text-white text-sm font-medium leading-normal">Alarm Settings</p>
</div>
<div class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-white/10 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</div>
</div>
<div class="rounded-full bg-white/10 h-1.5 overflow-hidden">
<div class="h-full bg-primary rounded-full transition-all duration-1000" style="width: 75%;"></div>
</div>
<div class="flex justify-between">
<p class="text-slate-400 text-[10px] font-bold uppercase tracking-wider">Sound: Digital Beep</p>
<p class="text-slate-400 text-[10px] font-bold uppercase tracking-wider">Volume: 80%</p>
</div>
</div>
</div>
</main>
<!-- Decorative backgrounds -->
<div class="absolute top-0 left-1/4 w-96 h-96 bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-0 right-1/4 w-96 h-96 bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
</div>
</body></html>
